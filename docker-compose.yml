version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: airbnb-mysql
    restart: unless-stopped
    command: --init-file /docker-entrypoint-initdb.d/01-create-db.sql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-airbnb_db}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init/01-create-db.sql:/docker-entrypoint-initdb.d/01-create-db.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airbnb-backend
    restart: unless-stopped
    ports:
      - "${PORT:-5008}:5008"
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-123456}@mysql:3306/${MYSQL_DATABASE:-airbnb_db}?allowPublicKeyRetrieval=true
      PORT: ${PORT:-5008}
      CLOUDINARY_NAME: ${CLOUDINARY_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      JWT_SECRET: ${JWT_SECRET:-secret123}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
